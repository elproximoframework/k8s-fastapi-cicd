name: CI - Lint y Tests

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  lint-and-test:
    name: Lint y Tests
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Obtener el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # Paso 2: Configurar Python con caché de dependencias
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-dev.txt"

      # Paso 3: Instalar dependencias de desarrollo
      - name: Instalar dependencias
        run: pip install -r requirements-dev.txt

      # Paso 4: Análisis estático con Ruff (Linting)
      - name: Lint con Ruff
        run: ruff check ./app ./tests

      # Paso 5: Ejecutar los tests unitarios con cobertura
      - name: Ejecutar Tests con pytest
        run: pytest tests/ -v --tb=short
