name: CD - Build y Deploy a EKS

on:
  push:
    branches:
      - main

permissions:
  id-token: write   # Necesario para OIDC
  contents: read    # Necesario para actions/checkout

jobs:
  # -------------------------------------------------------
  # JOB 1: Construir la imagen Docker y subirla a ECR
  # -------------------------------------------------------
  build-and-push:
    name: Build y Push a ECR
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Autenticarse en AWS usando OIDC (sin Access Keys estáticas)
      - name: Configurar credenciales AWS con OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Login en Amazon ECR
      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construir, etiquetar y subir la imagen a ECR
      - name: Build, Tag y Push de la imagen Docker
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG
          # También etiquetamos como 'latest'
          docker tag $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG \
                     $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest
          echo "image=$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # -------------------------------------------------------
  # JOB 2: Desplegar en EKS (requiere aprobación manual)
  # -------------------------------------------------------
  deploy-to-production:
    name: Deploy a EKS (Producción)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production  # <-- Requiere aprobación manual del reviewer

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Volver a autenticarse en AWS para este job
      - name: Configurar credenciales AWS con OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Configurar la conexión al clúster de EKS
      - name: Configurar Kubeconfig de EKS
        run: |
          aws eks update-kubeconfig --name ${{ vars.EKS_CLUSTER_NAME }} --region ${{ vars.AWS_REGION }}

      # Desplegar los manifiestos (Deployment, Service, Ingress)
      # Nota: Se omitió secret.yaml ya que External Secrets Operator los inyecta dinámicamente
      - name: Desplegar manifiestos en EKS
        run: |
          kubectl apply -f k8s/

      # Actualizar el deployment de Kubernetes con la nueva versión de la imagen
      - name: Actualizar imagen en el Deployment de EKS
        run: |
          kubectl set image deployment/fastapi-api fastapi-api=${{ needs.build-and-push.outputs.image }}

      # Verificar que los pods arranquen correctamente (Zero Downtime Rollout Check)
      - name: Verificar estabilidad del despliegue
        run: |
          kubectl rollout status deployment/fastapi-api --timeout=300s
